body{background:#f7eef3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:12px}

function makeCalUrl(ev){
  const dt=ev.d.replace(/-/g,'');
  // start 20:00 Lima = 01:00 UTC next day
  const start=dt+'T010000Z';
  // end 20:30 Lima
  const endDate=new Date(ev.d+'T01:30:00Z');
  const endStr=endDate.toISOString().replace(/[-:]/g,'').replace('.000','');
  const title=encodeURIComponent(ev.title);
  const desc=encodeURIComponent(ev.desc+'\n\n⏰ Recuerda: 8:00 PM hora Lima');
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${endStr}&details=${desc}&ctz=America/Lima`;
}

  const list=document.getElementById('cal-list');
  list.innerHTML='';
  CAL_EVENTS.forEach((ev,i)=>{
    const d=new Date(ev.d+'T12:00:00');
    const label=d.toLocaleDateString('es-PE',{weekday:'short',day:'numeric',month:'short'});
    const isRetiro=ev.title.includes('Retirar');
    const div=document.createElement('div');
    div.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:6px;border-radius:10px;border:1px solid #f0c0d4;background:#fff5f9;cursor:pointer;transition:background .15s';
    div.onmouseenter=()=>div.style.background='#fce4ec';
    div.onmouseleave=()=>div.style.background='#fff5f9';
    div.onclick=()=>window.open(makeCalUrl(ev),'_blank');
    div.innerHTML=`
      <div style="width:36px;height:36px;border-radius:8px;background:${isRetiro?'#e8eaf6':'#fce4ec'};display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${isRetiro?'🔴':'🩹'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${ev.title.replace('🩹 EVRA — ','')}</div>
        <div style="font-size:11px;color:#D4537E">${label} · 20:00 hrs</div>
      </div>
      <div style="font-size:18px">↗️</div>`;
    list.appendChild(div);
  });
  document.getElementById('cal-modal').style.display='flex';
}

function hideCalModal(){
  document.getElementById('cal-modal').style.display='none';
}

function addAllCal(){

  });
}

  {d:'2026-06-30',l:'Retirar parche — Inicio descanso',z:''},
  {d:'2026-07-07',l:'Colocar Parche #1 — Ciclo 2',z:'Abdomen inferior derecho'},
  {d:'2026-07-14',l:'Cambiar a Parche #2',z:'Glúteo izquierdo'},
  {d:'2026-07-21',l:'Cambiar a Parche #3',z:'Muslo externo derecho'},
  {d:'2026-07-28',l:'Retirar parche — Inicio descanso',z:''},

];

function now(){return new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'})}
function scroll(){setTimeout(()=>{const m=document.getElementById('msgs');m.scrollTop=m.scrollHeight},60)}

function addBubble(role,html,type){
  const msgs=document.getElementById('msgs');
  const wrap=document.createElement('div');
  wrap.className='msg '+(role==='user'?'user':'bot');
  const b=document.createElement('div');
  b.className='bubble'+(type?' '+type:'');
  b.innerHTML=html;
  const ts=document.createElement('span');
  ts.className='ts';
  ts.textContent=now();
  wrap.appendChild(b);
  wrap.appendChild(ts);
  msgs.appendChild(wrap);
  scroll();
}

function addChips(texts){
  const msgs=document.getElementById('msgs');
  const wrap=document.createElement('div');
  wrap.className='chips';
  texts.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='chip';
    btn.textContent=t;
    btn.onclick=()=>{wrap.remove();q(t)};
    wrap.appendChild(btn);
  });
  msgs.appendChild(wrap);
  scroll();
}

function typing(){
  const msgs=document.getElementById('msgs');
  const w=document.createElement('div');
  w.className='msg bot';w.id='typ';
  w.innerHTML='<div class="bubble"><div class="dot-wrap"><span></span><span></span><span></span></div></div>';
  msgs.appendChild(w);scroll();
}
function rmTyping(){const t=document.getElementById('typ');if(t)t.remove()}

function setLock(v){
  busy=v;
  document.getElementById('inp').disabled=v;
  document.getElementById('sendbtn').disabled=v;
  document.querySelectorAll('.qbtn,.chip').forEach(b=>b.disabled=v);
}

function parseBtns(text){
  const m=text.match(/\[BTNS:\s*(.*?)\]/);
  if(!m)return{btns:[],clean:text};
  const btns=m[1].split('|').map(s=>s.trim()).filter(Boolean);
  return{btns,clean:text.replace(/\[BTNS:.*?\]/,'').trim()};
}

function renderMd(t){
  return t
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/_(.*?)_/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}

async function callApi(userText){
  hist.push({role:'user',content:userText});
  if(hist.length>MAX_HIST) hist=hist.slice(-MAX_HIST);
  const r=await fetch('https://evra-care-proxy.luisfenandopebe.workers.dev',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:700,system:SYS,messages:hist})
  });
  if(!r.ok)throw new Error('API '+r.status);
  const d=await r.json();
  const raw=d.content?.[0]?.text||'No pude responder, intenta de nuevo 🙏';
  hist.push({role:'assistant',content:raw});
  if(hist.length>MAX_HIST) hist=hist.slice(-MAX_HIST);
  return raw;
}

async function send(){
  if(busy)return;
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';inp.style.height='';
  addBubble('user',renderMd(txt));
  await processMsg(txt);
}

async function q(txt){
  if(busy)return;
  addBubble('user',renderMd(txt));
  await processMsg(txt);
}

async function processMsg(txt){
  setLock(true);typing();
  try{
    const raw=await callApi(txt);
    rmTyping();
    const {btns,clean}=parseBtns(raw);
    const isAlert=clean.includes('🚨');
    addBubble('bot',renderMd(clean),isAlert?'alert':'');
    if(btns.length>0)addChips(btns);
  }catch(e){
    rmTyping();
    addBubble('bot','Hubo un error de conexión 😔 Por favor intenta de nuevo.','warn');
  }
  setLock(false);
}

function updateStatus(){
  const td=new Date().toISOString().slice(0,10);
  const nx=EVENTS.find(e=>e.d>=td);
  const st=document.getElementById('status-txt');
  if(nx){
    const diff=Math.round((new Date(nx.d+'T12:00:00')-new Date())/86400000);
    const pre=diff<=0?'HOY':diff===1?'Mañana':'En '+diff+' día'+(diff>1?'s':'');
    st.textContent=pre+' · '+nx.l+(nx.z?' · '+nx.z:'')+' · 20:00 hrs';
  }
}

const inp=document.getElementById('inp');
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,90)+'px'});

updateStatus();
